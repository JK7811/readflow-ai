<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#171411">
<title>ReadFlow AI - THE SHOCKER No.41</title>
<link rel="stylesheet" href="./styles.css">
</head>
<body>
<header class="topbar">
  <button id="backBtn" class="icon hidden">←</button>
  <div class="brand">ReadFlow <span>AI</span></div>
  <div class="spacer"></div>
  <button id="themeBtn" class="icon">◐</button>
</header>

<main>
<section id="library" class="view active">
  <div class="hero">
    <p class="eyebrow">COMPLETE 48-PAGE READER</p>
    <h1>Read. Listen.<br>Understand.</h1>
    <p>整本 48 页已经导入。第 2、3 页已有完整中英学习内容，其余页面先保留原刊并可正常翻页。</p>
  </div>
  <div class="library">
    <article class="book">
      <img src="./assets/pages/page-01.jpg" alt="cover">
      <div class="bookInfo">
        <p class="eyebrow">TRUE CRIME · 48 PAGES</p>
        <h2>THE SHOCKER No.41</h2>
        <p class="muted">June 2026 · Complete Reader</p>
        <div class="row"><span>上次阅读</span><strong id="lastPageText">Page 1 / 48</strong></div>
        <div class="track"><div id="libraryProgress"></div></div>
        <div class="row"><span>已完成学习版</span><strong>2 / 48</strong></div>
        <button id="openBtn" class="primary">继续阅读</button>
      </div>
    </article>
  </div>
</section>

<section id="reader" class="view">
  <div class="readerGrid">
    <aside class="pagePane">
      <img id="pageImage" alt="magazine page">
      <div id="pageCaption"></div>
    </aside>

    <section class="contentPane">
      <div class="toolbar">
        <div>
          <p id="pageCounter" class="eyebrow"></p>
          <div class="track small"><div id="readerProgress"></div></div>
        </div>
        <div class="tools">
          <select id="pageSelect"></select>
          <select id="rate">
            <option value="0.7">0.7×</option>
            <option value="0.85">0.85×</option>
            <option value="1" selected>1.0×</option>
            <option value="1.15">1.15×</option>
          </select>
          <button id="playAll" class="secondary">▶ 连续播放</button>
          <button id="stop" class="danger">■ 停止</button>
        </div>
      </div>

      <div id="learningContent"></div>

      <div class="nav">
        <button id="prev" class="secondary">← 上一页</button>
        <button id="next" class="primary">下一页 →</button>
      </div>
    </section>
  </div>
</section>
</main>

<script src="./app.js"></script>
</body>
</html>
